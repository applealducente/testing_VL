<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>VoiceLab — FCF Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a1322;--bg2:#0f1c30;--surface:#16273f;--surface2:#1c3150;
  --line:#22344f;--ink:#eaf0fb;--muted:#8ea0bd;--dim:#5d7290;
  --orange:#f35d2a;--gold:#c18c1b;--good:#33c27a;--bad:#ef5a6f;--cyan:#3fc6e0;
  --sans:"Inter","Helvetica Neue",system-ui,Arial,sans-serif;
  --display:"Anton","Inter",sans-serif;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(900px 500px at 12% -8%,rgba(243,93,42,.10),transparent 60%),radial-gradient(800px 480px at 105% 0%,rgba(193,140,27,.10),transparent 55%),var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;min-height:100vh}
#app{max-width:720px;margin:0 auto;padding:20px 16px 60px}
.topbar{display:flex;align-items:center;gap:12px;padding:8px 0 20px;border-bottom:1px solid var(--line);margin-bottom:24px}
.brandlogo{height:28px}
.pill{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
.pill.g{color:var(--gold);border-color:rgba(193,140,27,.4);background:rgba(193,140,27,.08)}
.grow{flex:1}
h1{font-family:var(--display);font-size:30px;font-weight:400;letter-spacing:.01em;text-transform:uppercase;margin:6px 0 4px}
h2{font-family:var(--display);font-size:22px;font-weight:400;text-transform:uppercase;letter-spacing:.01em;margin:0 0 12px}
.kicker{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.sub{color:var(--muted);font-size:14px;line-height:1.6;margin:6px 0 0}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-bottom:14px}
.label{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:14px 0 6px}
.label:first-child{margin-top:0}
input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:10px 12px;font-family:var(--sans);font-size:14px;outline:none;appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
select option{background:var(--bg2)}
.btn{display:block;width:100%;background:var(--orange);color:#fff;border:none;border-radius:12px;padding:13px;font-family:var(--display);font-size:18px;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.9}
.btn.gold{background:var(--gold)}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink);font-family:var(--sans);font-size:14px;font-weight:600;letter-spacing:0;text-transform:none;border-radius:10px;padding:10px 16px}
.btn.ghost:hover{border-color:var(--dim)}
.btn.sm{font-size:14px;padding:10px}
.btn:disabled{opacity:.4;cursor:default}
.row{display:flex;gap:10px;align-items:center}
.diff-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}
.diff-card{background:var(--surface);border:2px solid var(--line);border-radius:14px;padding:16px;cursor:pointer;transition:border-color .15s}
.diff-card:hover{border-color:var(--dim)}
.diff-card[data-on="1"]{border-color:var(--gold);background:rgba(193,140,27,.06)}
.diff-card .dlabel{font-family:var(--display);font-size:15px;font-weight:400;text-transform:uppercase;letter-spacing:.05em}
.diff-card .dblurb{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.4}
/* call screen */
.status{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:16px}
.live{display:flex;align-items:center;gap:5px;color:var(--good)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--good);animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.callwrap{display:flex;flex-direction:column;align-items:center;gap:0}
.stage{display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px 0 16px;width:100%}
.av{position:relative;width:110px;height:110px}
.ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--cyan);opacity:.25;animation:ring 2s ease-out infinite}
.ring.r2{animation-delay:.5s}.ring.r3{animation-delay:1s}
.av[data-mode="speaking"] .ring{opacity:.5;border-color:var(--orange)}
.av[data-mode="busy"] .ring{opacity:.3;border-color:var(--gold);animation-duration:1s}
.av[data-mode="idle"] .ring{opacity:.08}
.avc{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--surface2);font-family:var(--display);font-size:28px;color:var(--gold);z-index:1}
.pn{font-family:var(--display);font-size:20px;text-transform:uppercase;letter-spacing:.06em}
.ploc{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.hint{font-size:13px;color:var(--cyan);min-height:20px;letter-spacing:.02em;margin-top:4px}
.spin-ring{display:inline-block;width:12px;height:12px;border-radius:50%;border:2px solid var(--line);border-top-color:var(--gold);animation:sp .8s linear infinite;margin-right:6px;vertical-align:-1px}
@keyframes sp{to{transform:rotate(360deg)}}
.endcall{width:60px;height:60px;border-radius:50%;background:var(--bad);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:16px auto 0;box-shadow:0 4px 20px rgba(239,90,111,.3);transition:transform .1s}
.endcall:hover{transform:scale(1.05)}
.endcall svg{width:22px;height:22px;fill:#fff}
.endcall-label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--muted);text-align:center;margin-top:6px;text-transform:uppercase}
.transcript{max-height:220px;overflow-y:auto;margin-top:18px;display:flex;flex-direction:column;gap:8px}
.tline{display:flex;gap:10px;align-items:flex-start;font-size:13.5px;line-height:1.5}
.who{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;min-width:34px;margin-top:2px;flex-shrink:0}
.who.p{color:var(--cyan)}
.who.r{color:var(--gold)}
.note-bar{background:var(--surface2);border:1px solid var(--line);border-radius:10px;padding:9px 14px;font-size:12.5px;color:var(--muted);margin-top:10px;display:flex;align-items:center;gap:8px}
/* debrief */
.score-big{font-family:var(--display);font-size:56px;line-height:1;color:var(--gold)}
.pass-badge{display:inline-block;padding:4px 14px;border-radius:999px;font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;font-weight:700}
.pass-badge.pass{background:rgba(51,194,122,.15);color:var(--good);border:1px solid rgba(51,194,122,.3)}
.pass-badge.fail{background:rgba(239,90,111,.12);color:var(--bad);border:1px solid rgba(239,90,111,.3)}
.rubric-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.rubric-row:last-child{border-bottom:none}
.rubric-score{font-family:var(--mono);font-weight:700;font-size:14px}
.section-title{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin:16px 0 8px}
.li{font-size:13.5px;line-height:1.55;padding:5px 0 5px 16px;position:relative;color:var(--ink)}
.li::before{content:"•";position:absolute;left:0;color:var(--gold)}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin-top:6px}
.profile-item{font-size:12.5px;color:var(--muted)}.profile-item b{color:var(--ink)}
/* tracker form */
.tracker-section{background:rgba(193,140,27,.06);border:1px solid rgba(193,140,27,.25);border-radius:14px;padding:16px 18px;margin-top:16px}
.saving-note{font-size:12.5px;color:var(--muted);text-align:center;margin-top:8px}
/* gate */
.gate{max-width:400px;margin:60px auto 0;text-align:center}
.gate input{text-align:center;font-size:20px;letter-spacing:.1em}
/* settings */
.enginebadge{border-left:3px solid var(--gold);padding:10px 14px;background:rgba(193,140,27,.06);border-radius:0 10px 10px 0;font-size:13px;line-height:1.55;margin:6px 0}
.enginebadge.good{border-color:var(--good);background:rgba(51,194,122,.06)}
code{font-family:var(--mono);background:var(--surface2);padding:1px 5px;border-radius:4px;font-size:11.5px}
.dimw{color:var(--dim);font-weight:400}
</style>
</head>

/* ============================================================

   ============================================================ */
function makeRng(seed){let s=seed>>>0||1;return()=>{s^=s<<13;s^=s>>>17;s^=s<<5;return((s>>>0)/4294967296);};}
function pick(rng,arr){return arr[Math.floor(rng()*arr.length)];}
function chance(rng,p){return rng()<p;}

const PERF_LOG = true;
function nowMs(){ return (typeof performance !== "undefined" && performance.now) ? performance.now() : Date.now(); }
function logPerf(label, start, extra=""){

function buildCustomerPrompt(p){
  const entry={
    "OPEN PROSPECT":"After they intro Homeaglow, react with mild curiosity. You vaguely remember looking into it.",
    "LIGHT RESISTANCE":"After they intro, say you only have a minute or ask them to be quick. Stay on the line.",
    "MILD RESISTANCE":"After they intro, be a bit skeptical — you already looked into it or you're not sure you need it.",
    "ONSET OBJECTION":"After they explain the call, raise one real concern right away (found a cleaner, want one-time, no commitment).",
    "HARD RESISTANCE":"After they intro, firmly push back — take me off your list, already solved it, don't need cleaning. Soften only if they're very persistent and respectful.",
  };
  const feel={
    basic:"Open and cooperative. Answer honestly. Easy to win over if the agent is decent.",
    intermediate:"Normal skeptical person. Short answers unless asked good questions. One real concern but can be won over.",
    advanced:"Guarded. Don't volunteer anything. Real objections. Need strong discovery and value-building before agreeing.",
  };
  return `You are ${p.name}, ${p.age}, ${p.occupation} in ${p.area}. You just answered an unexpected call from Homeaglow, a home cleaning company.

HOME: ${p.beds}bd/${p.baths}ba${p.hasPets?", pet":""}. SITUATION: ${p.scenario}. PERSONALITY: ${p.personality}. BUDGET: ${p.budgetSensitivity}.

ENTRY: ${p.entry.type} — ${entry[p.entry.type]||"React naturally after they introduce themselves."}
DIFFICULTY: ${feel[p.difficulty]}
${p.isOneTime?"ONE-TIME: You wanted one cleaning but don't automatically shut down membership talk. Give a real reason if you say no. Let them try.":""}

SOUND HUMAN: Casual phone talk. Short — 1-3 sentences max. Contractions. Say 'yeah', 'hmm', 'I mean...' React to what they actually said.
ONE OBJECTION AT A TIME: Raise one concern, stick with it until addressed. Never stack or repeat.
RULES: Only speak as ${p.name}. Never coach or evaluate. English only. End when you genuinely commit or agent says END CALL.

FIRST RESPONSE: Say only "${p.entry.line}" — wait for them to introduce themselves before reacting to your entry type.`;
}

/* ============================================================
   LLM CALLS
   ============================================================ */
async function llmChat({system,turns,maxTokens=100,temperature=0.85,json=false,model=null}){
  const pv=provider();
  const useModel = model || pv.chat;
  const label = json ? "Evaluation LLM" : "Live customer LLM";
  const t0 = nowMs();

  if(pv.kind==="vercel"){
    const ctrl=new AbortController();const to=setTimeout(()=>ctrl.abort(),20000);
    try{
      const r=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:useModel,temperature,max_tokens:maxTokens,
          messages:[{role:"system",content:system},...turns],
          ...(json?{response_format:{type:"json_object"}}:{})}),signal:ctrl.signal});
      clearTimeout(to);
      if(!r.ok) throw new Error("api/chat "+r.status);
      const data=await r.json();
      const text=(data.choices?.[0]?.message?.content||"").trim();
      const usage=data.usage ? `model=${useModel} · prompt=${data.usage.prompt_tokens||0} · completion=${data.usage.completion_tokens||0}` : `model=${useModel}`;
      logPerf(label, t0, usage);
      return text;
    }catch(e){
      clearTimeout(to);
      logPerf(label + " failed", t0, `model=${useModel} · ${e.message||e}`);
      return null;
    }
  }

  // builtin (Claude.ai preview) — no key needed
  const ctrl=new AbortController();const to=setTimeout(()=>ctrl.abort(),20000);
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
      headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:useModel,max_tokens:maxTokens,system,messages:turns}),signal:ctrl.signal});
    clearTimeout(to);
    if(!r.ok) throw new Error("anthropic "+r.status);
    const data=await r.json();
    const text=(data.content||[]).map(b=>b.type==="text"?b.text:"").join("").trim();
    logPerf(label, t0, `model=${useModel}`);
    return text;
  }catch(e){
    clearTimeout(to);
    logPerf(label + " failed", t0, `model=${useModel} · ${e.message||e}`);
    return null;
  }
}


async function llmReply(p,history){
  const sys=buildCustomerPrompt(p);
  const turns=history.map(m=>({role:m.speaker==="agent"?"user":"assistant",content:m.text}));
  // Phase 1: use the provider default for live replies. On Vercel this is gpt-4o-mini.
  // Keep the stronger/larger model out of the live turn to reduce latency.
  const pv=provider();
  const replyModel = pv.chat;
  let out=await llmChat({system:sys,turns,maxTokens:60,temperature:0.85,model:replyModel});
  if(!out) return null;
  // strip any coaching / agent lines
  out=out.split("\n").filter(l=>{
    const low=l.toLowerCase();
    return !low.startsWith("agent:")&&!low.startsWith("sales agent:")&&!low.includes("great job")&&!low.includes("as a coach")&&!low.includes("you should");
  }).join(" ").trim();
  return out||null;
}

/* ============================================================
   VOICE ENGINE — clean single-responsibility design
   One audio element at a time. One mic session at a time.
   No overlapping, no race conditions.
   ============================================================ */

// ---- Audio playback ----
let _audio = null;   // the single active Audio element
let currentAudio = null; // alias kept for compatibility
let lastTTSError = "";

function _stopAudio(){
  try{ if(_audio){ _audio.pause(); _audio.src=""; _audio=null; } }catch(e){}
  ST.speaking = false;
}
// keep legacy name for compatibility
function stopAudio(){ _stopAudio(); }

async function _fetchAudio(text, voice){
  const pv = provider();
  if(pv.kind !== "vercel") return null;
  const t0 = nowMs();
  try{
    const r = await fetch("/api/speak",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({model:"tts-1-hd", voice, input:text, response_format:"mp3"})
    });
    if(!r.ok){
      try{ const j=await r.json(); lastTTSError=`HTTP ${r.status}: ${j?.error?.message||""}`; }catch(e){ lastTTSError=`HTTP ${r.status}`; }
      logPerf("TTS fetch failed", t0, lastTTSError);
      return null;
    }
    const buf = await r.arrayBuffer();
    logPerf("TTS fetch", t0, `voice=${voice} · chars=${text.length}`);
    return buf;
  }catch(e){
    lastTTSError=e.message||"Network error";
    logPerf("TTS fetch failed", t0, lastTTSError);
    return null;
  }
}

async function _playBuffer(buf, onEnded){
  const url = URL.createObjectURL(new Blob([buf],{type:"audio/mpeg"}));
  const a = new Audio(url);
  _audio = a;
  ST.speaking = true; renderStatus();
  return new Promise(resolve=>{
    a.onended = ()=>{ _stopAudio(); URL.revokeObjectURL(url); if(onEnded)onEnded(); resolve(true); };
    a.onerror = ()=>{ _stopAudio(); URL.revokeObjectURL(url); resolve(false); };
    a.play().catch(()=>{ _stopAudio(); resolve(false); });
  });
}

/* speak(text, onDone)
   Fires TTS immediately — no splitting, no queuing, one fetch → one play.
   Text can appear on screen before or after, voice is the priority. */
async function speak(text, onDone){
  if(!text||!text.trim()){ if(onDone)onDone(); return; }
  if(ST.call&&ST.call.ended){ if(onDone)onDone(); return; }
  const t0 = nowMs();
  const pv = provider();
  if(pv.kind === "vercel"){
    // OpenAI TTS — fetch audio then play immediately
    const voice = ST.call?.profile?.ttsVoice || "nova";
    const buf = await _fetchAudio(text, voice);
    if(buf){
      _stopAudio();
      await _playBuffer(buf, ()=>{
        logPerf("TTS fetch + playback", t0, `chars=${text.length}`);
        if(onDone)onDone();
      });
      return;
    }
    // TTS failed — fall back to browser
  }
  _speakBrowser(text, ()=>{
    logPerf("Browser speech playback", t0, `chars=${text.length}`);
    if(onDone)onDone();
  });
}

function _speakBrowser(text, onDone){
  if(!("speechSynthesis" in window)){ if(onDone)onDone(); return; }
  try{
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    const vs = window.speechSynthesis.getVoices();
    const pref = vs.find(v=>/en[-_]US/i.test(v.lang)&&/natural|samantha|google/i.test(v.name)) || vs.find(v=>/en/i.test(v.lang));
    if(pref) u.voice = pref;
    u.rate = 1.02;
    u.onstart = ()=>{ ST.speaking=true; renderStatus(); };
    u.onend = ()=>{ ST.speaking=false; renderStatus(); if(onDone)onDone(); };
    u.onerror = ()=>{ ST.speaking=false; if(onDone)onDone(); };
    window.speechSynthesis.speak(u);
  }catch(e){ if(onDone)onDone(); }
}

function markSpeaking(on){ renderStatus(); }

/* ============================================================
   SPEECH RECOGNITION — mic input
   ============================================================ */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
function speechSupported(){ return !!SR; }
let _rec = null;
let _finalText = "";
let _silenceTimer = null;
let _maxTimer = null;
let _micGranted = false;
let _pendingRestart = null;

const SILENCE_MS = 700;    // 700ms — natural conversation pause, fires LLM faster
const MAX_LISTEN_MS = 40000;

let _submitted = false; // prevent double-submit if both silence and onend fire

function _clearTimers(){
  if(_silenceTimer){ clearTimeout(_silenceTimer); _silenceTimer=null; }
  if(_maxTimer){ clearTimeout(_maxTimer); _maxTimer=null; }
}

function _armSilence(){
  _clearTimers();
  _silenceTimer = setTimeout(()=>{
    // Fire LLM IMMEDIATELY when silence is detected — don't wait for mic to close
    const text = _finalText.trim();
    if(text && !_submitted && !ST.busy && ST.call && !ST.call.ended){
      _submitted = true;
      _finalText = "";
      try{ if(_rec) _rec.stop(); }catch(e){} // close mic in background
      submitAgent(text); // start LLM right now
    } else {
      try{ if(_rec) _rec.stop(); }catch(e){}
    }
  }, SILENCE_MS);
}

function armSilenceTimer(){ _armSilence(); }
function clearSpeechTimers(){ _clearTimers(); }

async function warmUpMic(){
  if(_micGranted) return true;
  try{
    const s = await navigator.mediaDevices.getUserMedia({audio:true});
    s.getTracks().forEach(t=>t.stop());
    _micGranted = true; return true;
  }catch(e){ _micGranted=false; return false; }
}

function _buildRec(){
  if(_rec) return _rec;
  _rec = new SR();
  _rec.lang = "en-US";
  _rec.continuous = true;
  _rec.interimResults = true;
  _rec.maxAlternatives = 1;

  _rec.onresult = ev=>{
    let interim = "";
    for(let i=ev.resultIndex; i<ev.results.length; i++){
      const t = ev.results[i][0].transcript;
      if(ev.results[i].isFinal) _finalText += t + " ";
      else interim += t;
    }
    const live = (_finalText + interim).trim();
    const cap = document.getElementById("caption");
    if(cap) cap.textContent = live || "Listening…";
    // Natural interruption — if agent speaks while customer is talking, stop customer
    if(ST.speaking && live.length > 3){
      _stopAudio();
      try{ window.speechSynthesis && window.speechSynthesis.cancel(); }catch(e){}
    }
    _armSilence(); // reset silence countdown on every new speech token
  };

  _rec.onerror = ev=>{
    if(ev.error === "not-allowed" || ev.error === "audio-capture"){
      _micGranted = false; ST.autoVoice = false; ST.listening = false; render();
    }
  };

  _rec.onend = ()=>{
    _clearTimers();
    ST.listening = false;
    const text = _finalText.trim();
    _finalText = "";
    if(ST.call && ST.call.ended){ _submitted=false; render(); return; }
    // Only submit if silence timer didn't already do it
    if(text && !_submitted && !ST.busy){
      _submitted = true;
      submitAgent(text);
    } else if(!_submitted && ST.autoVoice && ST.call && !ST.call.ended && !ST.busy && !ST.speaking){
      _pendingRestart = setTimeout(startListening, 200);
    } else {
      render();
    }
    _submitted = false;
  };

  return _rec;
}

// legacy alias
function getRecognition(){ return _buildRec(); }

async function startListening(){
  if(!SR || ST.busy || !ST.call || ST.call.ended) return;
  // Don't start mic while customer is still speaking
  if(ST.speaking) return;
  const ok = await warmUpMic(); if(!ok){ render(); return; }
  try{
    const r = _buildRec();
    _finalText = ""; _clearTimers();
    ST.listening = true; render();
    r.start();
    _maxTimer = setTimeout(()=>{ try{ if(_rec) _rec.stop(); }catch(e){} }, MAX_LISTEN_MS);
  }catch(e){ ST.listening=false; render(); }
}

function stopListening(){
  _clearTimers();
  try{ if(_rec){ _rec.stop(); } }catch(e){}
  ST.listening = false;
}

function stopAll(){
  if(_pendingRestart){ clearTimeout(_pendingRestart); _pendingRestart=null; }
  stopListening();
  _stopAudio();
  try{ window.speechSynthesis && window.speechSynthesis.cancel(); }catch(e){}
  ST.listening = false; ST.speaking = false;
}

function pushCustomer(text){
  if(!text || !ST.call || ST.call.ended) return;
  ST.history.push({speaker:"customer", text});

    if(ST.call && !ST.call.ended && ST.autoVoice && !ST.busy){

}

function initCall(p){

async function submitAgent(text){
  if(ST.busy||!ST.call||ST.call.ended)return;
  const turnStart = nowMs();
  ST.history.push({speaker:"agent",text});
  ST.busy=true;render();
  let line=null;
  if(!ST.call.ended){
    line=await llmReply(ST.call.profile,ST.history);
  }
  ST.busy=false;
  if(!line)line="Sorry, I didn't catch that.";
  logPerf("Agent speech → customer text ready", turnStart, `reply_chars=${line.length}`);
  pushCustomer(line);
}


async function startCall(){
  const p=buildProfile(ST.difficulty);
  ST.call=initCall(p);
  ST.history=[];ST.score=null;ST.coaching=null;
  ST.startedAt=Date.now();ST.voiceFallback=false;
  ST.busy=false;ST.callIncomplete=false;
  ST.saving=false;ST.saved=false;ST.saveError="";ST._dashSaved=false;
  ST.view="call";render();
  ST.autoVoice=speechSupported();
  if(ST.autoVoice)await warmUpMic();
  // Fire first customer line immediately — no extra delays
  pushCustomer(p.entry.line);
}

async function endCall(){
  ST.autoVoice=false;
  if(ST.call)ST.call.ended=true;
  stopAll();
  if(ST.view==="debrief")return;
  const agentTurns=ST.history.filter(m=>m.speaker==="agent").length;
  ST.callIncomplete=agentTurns<2;
  ST.view="debrief";render();
  if(!ST.callIncomplete){
    const res=await llmEvaluate(ST.call.profile,ST.history);
    ST.score=res;ST.coaching=res;
    render();
  }
}

function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function initials(n){return n.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();}

function renderStatus(){

/* DASHBOARD */
function renderDashboard(app){
  const rows=dashLoad();
  const filterAgent=ST._dashFilter||"";
  const filterLob=ST._dashFilterLob||"";
  const filterResult=ST._dashFilterResult||"";

  let filtered=rows;
  if(filterAgent.trim()) filtered=filtered.filter(r=>(r.agent_name||"").toLowerCase().includes(filterAgent.toLowerCase()));
  if(filterLob) filtered=filtered.filter(r=>(r.lob||"")===filterLob);
  if(filterResult) filtered=filtered.filter(r=>(r.result||"")===filterResult);

  const agents=[...new Set(rows.map(r=>r.agent_name).filter(Boolean))].sort();
  const lobs=[...new Set(rows.map(r=>r.lob).filter(Boolean))].sort();
  const total=filtered.length;
  const passed=filtered.filter(r=>r.result==="PASS").length;
  const failed=filtered.filter(r=>r.result==="FAIL").length;
  const scores=filtered.map(r=>Number(r.overall_score)).filter(n=>!isNaN(n));
  const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):null;

  app.innerHTML=`
  <div class="topbar">
    <img src="${LOGO_DATA_URI}" class="brandlogo" alt="PA"/>
    <span class="pill g">Dashboard</span>
    <span class="grow"></span>
    <button class="btn ghost" id="dlCsv" style="padding:6px 12px;font-size:12px">⬇ CSV</button>
    <button class="btn ghost" id="backDash" style="padding:6px 12px;font-size:12px">← Back</button>
  </div>
  <div class="kicker">Leads &amp; Managers view</div>
  <h1>Results Dashboard</h1>

  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0">
    <div class="card" style="padding:14px;text-align:center"><div style="font-family:var(--display);font-size:34px">${total}</div><div style="font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;margin-top:4px">Total</div></div>
    <div class="card" style="padding:14px;text-align:center"><div style="font-family:var(--display);font-size:34px;color:var(--good)">${passed}</div><div style="font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;margin-top:4px">Passed</div></div>
    <div class="card" style="padding:14px;text-align:center"><div style="font-family:var(--display);font-size:34px;color:var(--bad)">${failed}</div><div style="font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;margin-top:4px">Failed</div></div>
    <div class="card" style="padding:14px;text-align:center"><div style="font-family:var(--display);font-size:34px;color:var(--gold)">${avg??'—'}</div><div style="font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;margin-top:4px">Avg Score</div></div>
  </div>

  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
    <input id="fAgent" placeholder="Search by name…" value="${esc(filterAgent)}" style="flex:1;min-width:160px"/>
    <select id="fLob" style="min-width:130px">
      <option value="">All LOBs</option>
      ${lobs.map(l=>`<option value="${esc(l)}" ${filterLob===l?"selected":""}>${esc(l)}</option>`).join("")}
    </select>
    <select id="fResult" style="min-width:120px">
      <option value="">All results</option>
      <option value="PASS" ${filterResult==="PASS"?"selected":""}>Pass only</option>
      <option value="FAIL" ${filterResult==="FAIL"?"selected":""}>Fail only</option>
    </select>
  </div>

  ${filtered.length===0
    ?`<div class="card" style="text-align:center;padding:40px;color:var(--muted)">No results yet — complete a call to see results here.</div>`
    :`<div class="card" style="padding:0;overflow:hidden">
      ${filtered.map((r,i)=>`
      <div style="border-bottom:1px solid var(--line)">
        <div style="display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer" id="drow-${i}">
          <span style="font-weight:700;font-size:14px;min-width:130px">${esc(r.agent_name||"Unknown")}</span>
          <span style="font-family:var(--mono);font-size:10px;color:var(--muted);min-width:80px">${esc(r.lob||"")}</span>
          <span style="font-size:12.5px;color:var(--muted);flex:1">${esc(r.difficulty||"")} · ${esc(r.scenario||"")}</span>
          <span style="font-size:12px;color:var(--muted);min-width:120px;text-align:right">${esc(r.timestamp||"")}</span>
          <span class="pass-badge ${r.result==="PASS"?"pass":"fail"}" style="min-width:44px;text-align:center">${esc(r.result||"—")}</span>
          <span style="font-family:var(--display);font-size:20px;min-width:44px;text-align:right;color:${r.result==="PASS"?"var(--good)":"var(--bad)"}">${r.overall_score??'—'}</span>
          <span style="color:var(--dim);font-size:11px" id="chev-${i}">▸</span>
        </div>
        <div id="ddetail-${i}" style="display:none;padding:0 16px 16px;border-top:1px solid var(--line)">
          <!-- Score Breakdown -->
          <div class="section-title">Score Breakdown</div>
          <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:4px 16px">
            ${[
              ["Rapport & Conversation Control",r.rapport,10],
              ["Pain Point ID",r.pain_point,15],
              ["Discovery",r.discovery,15],
              ["Pain Point Identification",r.pain_point,10],
              ["Voucher Explanation",r.voucher,15],
              ["Membership Explanation",r.membership,15],
              ["Objection Handling",r.objection_handling,15],
              ["Closing & Commitment",r.closing,15],
            ].map(([label,val,max])=>`<div class="rubric-row" style="padding:5px 0"><span style="font-size:12.5px">${label}</span><span class="rubric-score">${val??0}/${max}</span></div>`).join("")}
          </div>

          <!-- Hidden Profile -->
          ${r.hidden_profile&&r.hidden_profile.name?`
          <div class="section-title">Customer Profile</div>
          <div class="profile-grid">
            <div class="profile-item"><b>Name</b><br>${esc(r.hidden_profile.name||"")}</div>
            <div class="profile-item"><b>Age</b><br>${esc(r.hidden_profile.age||"")}</div>
            <div class="profile-item"><b>Occupation</b><br>${esc(r.hidden_profile.occupation||"")}</div>
            <div class="profile-item"><b>Personality</b><br>${esc(r.hidden_profile.personality||"")}</div>
            ${r.hidden_profile.primary_pain?`<div class="profile-item" style="grid-column:1/-1"><b>Primary Pain</b><br>${esc(r.hidden_profile.primary_pain)}</div>`:""}
          </div>`:""}

          <!-- Strengths -->
          ${r.strengths?.length?`<div class="section-title">Strengths</div>${r.strengths.map(s=>`<div class="li">${esc(s)}</div>`).join("")}`:""}

          <!-- Areas for Improvement -->
          ${r.areas_for_improvement?.length?`<div class="section-title">Areas for Improvement</div>${r.areas_for_improvement.map(s=>`<div class="li">${esc(s)}</div>`).join("")}`:""}

          <!-- Missed Discovery -->
          ${r.missed_discovery?.length?`<div class="section-title">Missed Discovery</div>${r.missed_discovery.map(s=>`<div class="li">${esc(s)}</div>`).join("")}`:""}

          <!-- Objections Needing Improvement -->
          ${r.objections_needing_improvement?.length?`<div class="section-title">Objections Needing Improvement</div>${r.objections_needing_improvement.map(o=>`
            <div style="margin-bottom:10px;font-size:13px">
              <div style="color:var(--muted)">Customer: <i>"${esc(o.objection||o)}"</i></div>
              ${o.issue?`<div style="color:var(--bad);margin-top:2px">Issue: ${esc(o.issue)}</div>`:""}
              ${o.better_response?`<div style="color:var(--good);margin-top:2px">Better: <i>"${esc(o.better_response)}"</i></div>`:""}
            </div>`).join("")}`:""}

          <!-- Coaching -->
          ${r.coaching_recommendations?.length?`<div class="section-title">Coaching Recommendations</div>${r.coaching_recommendations.map(s=>`<div class="li">${esc(s)}</div>`).join("")}`:""}

          <!-- Final Assessment -->
          ${r.final_readiness_assessment?`<div class="section-title">Final Readiness Assessment</div><p style="font-size:13.5px;line-height:1.6">${esc(r.final_readiness_assessment)}</p>`:""}

          <!-- Primary Gap & Recommended Drill -->
          ${r.primary_gap?`<div class="section-title">Primary Gap</div><p style="font-size:13.5px">${esc(r.primary_gap)}</p>`:""}
          ${r.recommended_drill?`<div class="section-title">Recommended Drill</div><p style="font-size:13.5px">${esc(r.recommended_drill)}</p>`:""}
        </div>
      </div>`).join("")}
    </div>`}
  `;

  document.getElementById("backDash").onclick=()=>{ST.view="setup";render();};

  document.getElementById("fAgent").oninput=e=>{ST._dashFilter=e.target.value;render();};
  document.getElementById("fLob").onchange=e=>{ST._dashFilterLob=e.target.value;render();};
  document.getElementById("fResult").onchange=e=>{ST._dashFilterResult=e.target.value;render();};

  // expand/collapse rows
  filtered.forEach((_,i)=>{
    const row=document.getElementById(`drow-${i}`);
    if(row) row.onclick=()=>{
      const d=document.getElementById(`ddetail-${i}`);
      const c=document.getElementById(`chev-${i}`);
      if(d){d.style.display=d.style.display==="none"?"block":"none";if(c)c.textContent=d.style.display==="none"?"▸":"▾";}
    };
  });

  // CSV download
  document.getElementById("dlCsv").onclick=()=>{
    const cols=["Timestamp","Agent Name","Email","Team","LOB","Difficulty","Scenario","Call Entry","Overall Score","Result",
      "Rapport","Early Objection","Discovery","Pain Point","Recommendation","Features Benefits","Objection Handling","Closing",
      "Primary Gap","Feedback","Recommended Drill","Transcript Summary"];
    const csvRows=[cols.join(","),...filtered.map(r=>[
      r.timestamp,r.agent_name,r.agent_email,r.team,r.lob,r.difficulty,r.scenario,r.call_entry,
      r.overall_score,r.result,r.rapport,r.early_objection,r.discovery,r.pain_point,
      r.recommendation,r.features_benefits,r.objection_handling,r.closing,
      r.primary_gap,r.feedback,r.recommended_drill,r.transcript_summary
    ].map(v=>{ const sv=String(v==null?"":v).replace(/"/g,'""'); return '"'+sv+'"'; }).join(","))];
    const blob=new Blob([csvRows.join("\n")],{type:"text/csv"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download=`voicelab-results-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();URL.revokeObjectURL(a.href);
  };
}


function renderSettings(app){
  const onVercel=window.location.protocol==="https:";
  app.innerHTML=`
  <div class="topbar">
    <img src="${LOGO_DATA_URI}" class="brandlogo" alt="PA"/>
    <span class="pill g">Settings</span>
    <span class="grow"></span>
    <button class="btn ghost" id="slock" style="padding:6px 12px;font-size:12px">Lock</button>
  </div>
  <div class="kicker">Manager-only</div>
  <h1>Settings</h1>
  <div class="card" style="margin-top:16px">
    <div class="label" style="margin-top:0">Team-wide backend (Vercel)</div>
    ${onVercel
      ?`<div class="enginebadge good"><b>● Connected</b> — natural voice &amp; full-accuracy AI scoring active for everyone. OpenAI key stored securely on the server.</div>
         <div style="margin-top:12px;display:flex;align-items:center;gap:10px">
           <button class="btn ghost" id="testVoice" style="padding:8px 14px">🔊 Test voice</button>
           <span id="testNote" style="font-size:13px;color:var(--muted)"></span>
         </div>`
      :`<div class="enginebadge"><b>● Not on Vercel</b> — deploy this project to Vercel with your OPENAI_API_KEY environment variable set.</div>`}
  </div>
  <div class="card">
    <div class="label" style="margin-top:0">Tracker (Google Sheet)</div>
    ${APPS_SCRIPT_URL
      ?`<div class="enginebadge good"><b>● Connected</b> — results auto-save after every scored call.</div>`
      :`<div class="enginebadge"><b>● Not connected</b> — edit the <code>APPS_SCRIPT_URL</code> constant at the top of <code>index.html</code> with your Google Apps Script Web App URL.</div>`}
  </div>
  <div class="card">
    <div class="label" style="margin-top:0">Passwords</div>
    <p style="font-size:13px;color:var(--muted);line-height:1.6">Settings password: <code>SETTINGS_PASSWORD</code> · Dashboard password: <code>ADMIN_PASSWORD</code> — both are constants at the top of <code>index.html</code>.</p>
  </div>
  <button class="btn ghost" id="homeBtn" style="margin-top:16px">← Back to home</button>`;
  document.getElementById("slock").onclick=()=>{ST.settingsAuthed=false;ST.view=ST.agent?"setup":"welcome";render();};
  document.getElementById("homeBtn").onclick=()=>{ST.view=ST.agent?"setup":"welcome";render();};
  const tv=document.getElementById("testVoice");
  if(tv)tv.onclick=async()=>{
    const tn=document.getElementById("testNote");
    tn.innerHTML='<span class="spin-ring"></span>Testing…';
    let testDone=false;
    await speak("Hi there! This is what your agents will hear during practice calls.",()=>{testDone=true;});
    setTimeout(()=>{
      if(testDone){tn.textContent="✅ Voice is working — every agent will hear this.";}
      else{tn.textContent=`❌ ${lastTTSError||"Could not reach /api/speak"} — check OPENAI_API_KEY in Vercel environment variables.`;}
    },100);
  };
}

   ============================================================ */
document.addEventListener("DOMContentLoaded",()=>{
  // inject logo
  const js=document.querySelector("script");
  if(js){
    const logoVal=js.innerHTML.match(/const LOGO_DATA_URI = "([^"]+)"/);
    if(logoVal){
      // already injected via Python — no-op
    }
  }
  render();
});
</script>
